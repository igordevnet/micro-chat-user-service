<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Recovery</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333;">
<table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <tr>
                    <td align="center" style="background-color: #ef4444; padding: 30px 0;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 28px; letter-spacing: 2px;">CHAT</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 40px 30px; text-align: center;">
                        <h2 style="color: #1e293b; margin-bottom: 20px;">Reset your password</h2>
                        <p style="font-size: 16px; line-height: 1.6; color: #64748b;">
                            We received a request to reset the password for your <strong>CHAT</strong> account. Click the button below to choose a new one.
                        </p>
                        <table border="0" cellspacing="0" cellpadding="0" style="margin: 30px auto;">
                            <tr>
                                <td align="center" bgcolor="#ef4444" style="border-radius: 6px;">
                                    <a href="{{recovery_link}}" target="_blank" style="font-size: 16px; font-weight: bold; color: #ffffff; text-decoration: none; padding: 15px 30px; display: inline-block;">
                                        Reset Password
                                    </a>
                                </td>
                            </tr>
                        </table>
                        <p style="font-size: 14px; color: #94a3b8; margin-top: 20px;">
                            If the button doesn't work, copy and paste this link into your browser:<br>
                            <span style="color: #2563eb; word-break: break-all;">{{recovery_link}}</span>
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 20px; text-align: center; background-color: #f8fafc; color: #94a3b8; font-size: 12px;">
                        © 2026 CHAT Project - Security Service
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
