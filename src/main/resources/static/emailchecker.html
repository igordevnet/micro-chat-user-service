<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333;">
<table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <tr>
                    <td align="center" style="background-color: #2563eb; padding: 30px 0;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 28px; letter-spacing: 2px;">CHAT</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 40px 30px; text-align: center;">
                        <h2 style="color: #1e293b; margin-bottom: 20px;">Verify your email address</h2>
                        <p style="font-size: 16px; line-height: 1.6; color: #64748b;">
                            Welcome to <strong>CHAT</strong>! Use the verification code below to confirm your account and start messaging.
                        </p>
                        <div style="margin: 30px 0; padding: 20px; background-color: #f1f5f9; border-radius: 12px; border: 2px dashed #cbd5e1; display: inline-block;">
                            <span style="font-size: 36px; font-weight: bold; color: #2563eb; letter-spacing: 8px;">{{verification_code}}</span>
                        </div>
                        <p style="font-size: 14px; color: #94a3b8; margin-top: 20px;">
                            This code will expire in 15 minutes. If you didn't request this, you can safely ignore this email.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 20px; text-align: center; background-color: #f8fafc; color: #94a3b8; font-size: 12px;">
                        © 2026 CHAT Project - Developed by Igorzera
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
